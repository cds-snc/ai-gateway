name: Workflow failure

on:
  workflow_call:
    secrets:
      LOG_ANALYTICS_WORKSPACE_ID:
        required: true
      LOG_ANALYTICS_WORKSPACE_KEY:
        required: true
      SLACK_WEBHOOK_URL:
        required: true
    inputs:
      environment:
        required: true
        type: string

permissions:
  contents: none

jobs:
  on-failure:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Audit DNS requests
        uses: cds-snc/dns-proxy-action@v1.2.0 # Immutable release
        env:
          DNS_PROXY_FORWARDTOSENTINEL: "true"
          DNS_PROXY_LOGANALYTICSWORKSPACEID: "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}"
          DNS_PROXY_LOGANALYTICSSHAREDKEY: "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}"
          DNS_PROXY_SAFELIST: "${{ vars.DNS_PROXY_SAFELIST }}"
          DNS_PROXY_WILDCARDGREEDY: "true"

      - name: Notify Slack
        env:
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: |
          json="{\"blocks\":[{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\":red: AI-Gateway workflow failed: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${GITHUB_WORKFLOW}>\"}}]}"
          curl -X POST -H 'Content-type: application/json' --data "$json" "${{ secrets.SLACK_WEBHOOK_URL }}"
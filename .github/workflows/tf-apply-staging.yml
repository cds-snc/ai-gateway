name: Terraform Apply Staging

concurrency:
  group: terraform-staging
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - "terragrunt/ai_gateway/**"
      - ".github/workflows/tf-apply-staging.yml"

env:
  AWS_REGION: ca-central-1
  TF_VAR_litellm_db_password: ${{ secrets.LITELLM_DB_PASSWORD }}
  TF_VAR_litellm_master_key: ${{ secrets.LITELLM_MASTER_KEY }}
  TF_VAR_litellm_redis_auth_token: ${{ secrets.LITELLM_REDIS_AUTH_TOKEN }}
  
permissions: {}

jobs:
  terragrunt-apply:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:

      - name: Audit DNS requests
        uses: cds-snc/dns-proxy-action@v1.2.0 # Immutable release
        env:
          DNS_PROXY_FORWARDTOSENTINEL: "true"
          DNS_PROXY_LOGANALYTICSWORKSPACEID: "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}"
          DNS_PROXY_LOGANALYTICSSHAREDKEY: "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}"
          DNS_PROXY_SAFELIST: "${{ vars.DNS_PROXY_SAFELIST }}"
          DNS_PROXY_WILDCARDGREEDY: "true"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Terraform tools
        uses: cds-snc/terraform-tools-setup@36df0d7572a15921998170395475093c183d720a # v1.3.0
        env:
          CONFTEST_VERSION: NONE
          TERRAFORM_VERSION: 1.15.5
          TERRAGRUNT_VERSION: 1.1.1
          TF_SUMMARIZE_VERSION: NONE
          TRUFFLEHOG_VERSION: NONE

      - name: configure aws credentials using OIDC
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ai-gateway-apply
          role-session-name: TFApply
          aws-region: ${{ env.AWS_REGION }}
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Apply Terraform
        working-directory: terragrunt/ai_gateway
        run: terragrunt run --non-interactive -- apply -auto-approve

  workflow-failure:
    needs: [terragrunt-apply]
    if: failure()
    uses: ./.github/workflows/workflow-failure.yml
    environment: staging
    secrets:
      LOG_ANALYTICS_WORKSPACE_ID: ${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}
      LOG_ANALYTICS_WORKSPACE_KEY: ${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
name: Terraform Plan Staging

concurrency:
  group: terraform-staging
  cancel-in-progress: false

on:
  pull_request:
    paths:
      - "terragrunt/**"
      - ".github/workflows/tf-plan-staging.yml"

env:
  AWS_REGION: ca-central-1
  TF_VAR_litellm_db_password: ${{ secrets.LITELLM_DB_PASSWORD }}
  TF_VAR_litellm_master_key: ${{ secrets.LITELLM_MASTER_KEY }}
  TF_VAR_litellm_redis_auth_token: ${{ secrets.LITELLM_REDIS_AUTH_TOKEN }}

permissions: {}

jobs:
  terraform-plan:

    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Audit DNS requests
        uses: cds-snc/dns-proxy-action@9ad793100229573be3f5ba78cc69ec523f2c8b7e # v1.1.0
        env:
          DNS_PROXY_FORWARDTOSENTINEL: "true"
          DNS_PROXY_LOGANALYTICSWORKSPACEID: "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}"
          DNS_PROXY_LOGANALYTICSSHAREDKEY: "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}"
          DNS_PROXY_SAFELIST: "${{ vars.DNS_PROXY_SAFELIST }}"
          DNS_PROXY_WILDCARDGREEDY: "true"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Terraform tools
        uses: cds-snc/terraform-tools-setup@36df0d7572a15921998170395475093c183d720a # v1.3.0
        env:
          CONFTEST_VERSION: 0.36.0 
          CONFTEST_CHECKSUM: d98783276c4fd47c779a1ece4c0decba9ee6462687839d25389882a468c362cc
          TERRAFORM_VERSION: 1.14.4
          TERRAFORM_CHECKSUM: 4a24b18865d9419ba7882567cb7429dd1525b3e2029a9e38f612d476ba8c3dea
          TERRAGRUNT_VERSION: 1.0.6
          TERRAGRUNT_CHECKSUM: 98b0400ba1ae27120adeeb98ba97e75eba0bab0b4cbd7b8bb148d4ed29e2f823
          TF_SUMMARIZE_VERSION: 0.3.5
          TF_SUMMARIZE_CHECKSUM: e0ea7b514f7a57a85e5e4594acdccbf2dce3af7e00fe90580b2ad9cc1288d317
          TRUFFLEHOG_VERSION: 3.90.12
          TRUFFLEHOG_CHECKSUM: 318fd1e8af68b54f4465437208582003a5948293ea401c5c67bb55f17e4e2102

      - name: configure aws credentials using OIDC
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: arn:aws:iam::${{ vars.STAGING_AWS_ACCOUNT_ID }}:role/cds-superset-plan 
          role-session-name: TFPlan
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform plan
        uses: cds-snc/terraform-plan@529b272050a8f718d14c59e62b59c124eead7efc # v5.0.4
        with:
          comment-delete: true
          comment-title: "AI Gateway Staging"
          directory: "terragrunt/ai_gateway"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          secret-scan: true
          terragrunt: true
name: Terraform Plan Staging

concurrency:
  group: terraform-staging
  cancel-in-progress: false

on:
  pull_request:
    paths:
      - "terragrunt/**"
      - ".github/workflows/tf-plan-staging.yml"

env:
  AWS_REGION: ca-central-1
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  TF_VAR_litellm_db_password: ${{ secrets.LITELLM_DB_PASSWORD }}
  TF_VAR_litellm_master_key: ${{ secrets.LITELLM_MASTER_KEY }}
  TF_VAR_litellm_redis_auth_token: ${{ secrets.LITELLM_REDIS_AUTH_TOKEN }}

permissions: {}

jobs:
  terraform-plan:

    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Audit DNS requests
        uses: cds-snc/dns-proxy-action@v1.2.0 # Immutable release
        env:
          DNS_PROXY_FORWARDTOSENTINEL: "true"
          DNS_PROXY_LOGANALYTICSWORKSPACEID: "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}"
          DNS_PROXY_LOGANALYTICSSHAREDKEY: "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}"
          DNS_PROXY_SAFELIST: "${{ vars.DNS_PROXY_SAFELIST }}"
          DNS_PROXY_WILDCARDGREEDY: "true"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Terraform tools
        uses: cds-snc/terraform-tools-setup@36df0d7572a15921998170395475093c183d720a # v1.3.0
        env:
          CONFTEST_VERSION: 0.49.0
          TERRAFORM_VERSION: 1.15.5
          TERRAGRUNT_VERSION: 1.1.1

      - name: configure the aws credentials using OIDC
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ai-gateway-plan
          role-session-name: TFPlan
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Plan
        uses: cds-snc/terraform-plan@529b272050a8f718d14c59e62b59c124eead7efc # v5.0.4
        with:
          comment-delete: true
          comment-title: "AI Gateway Staging"
          directory: "terragrunt/ai_gateway"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          secret-scan: true
          terragrunt: true